spring.application.name=PowerOps

# Server Configuration
server.port=8080

# Oracle Database Configuration
spring.datasource.url=jdbc:oracle:thin:@//localhost:1521/ORCLPDB
spring.datasource.username=POWEROPS
spring.datasource.password=123456
spring.datasource.driver-class-name=oracle.jdbc.OracleDriver

# MyBatis Configuration
mybatis.mapper-locations=classpath:mapper/*.xml
mybatis.type-aliases-package=com.example.powerops.entity
mybatis.configuration.map-underscore-to-camel-case=true
mybatis.configuration.jdbc-type-for-null=VARCHAR

# Logging
logging.level.com.example.powerops=DEBUG
logging.level.org.springframework.web=INFO
